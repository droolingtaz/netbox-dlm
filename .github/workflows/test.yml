name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package-build:
    name: Package build sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Install built wheel and verify templates shipped
        run: |
          pip install dist/*.whl
          # Run from outside the checkout: netbox_dlm/__init__.py imports
          # netbox core (not installed in this job), and if cwd still
          # contained the repo's own netbox_dlm/ dir, import would resolve
          # to that source tree instead of the installed wheel - defeating
          # the point of this check. find_spec avoids executing __init__.py.
          cd /tmp
          python -c "
          import importlib.util, os
          spec = importlib.util.find_spec('netbox_dlm')
          pkg_dir = os.path.dirname(spec.origin)
          tpl_dir = os.path.join(pkg_dir, 'templates', 'netbox_dlm')
          templates = [f for f in os.listdir(tpl_dir) if f.endswith('.html')]
          assert templates, 'no templates found in installed package - check [tool.setuptools.package-data]'
          print(f'{len(templates)} templates present in installed package: {pkg_dir}')
          "

  template-compile:
    name: Template compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Cache NetBox test checkout + venv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .dev
          key: netbox-test-env-${{ hashFiles('scripts/setup-test-env.sh') }}
      - name: Run template compile checks
        run: ./scripts/test-templates.sh
